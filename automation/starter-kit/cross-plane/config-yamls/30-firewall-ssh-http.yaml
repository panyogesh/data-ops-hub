apiVersion: compute.gcp.upbound.io/v1beta1
kind: Firewall
metadata:
  name: demo-fw-ssh-http
spec:
  providerConfigRef:
    name: default
  forProvider:
    project: round-vent-480303-q3
    description: "Allow SSH, HTTP, HTTPS to demo instances"
    direction: INGRESS
    priority: 1000

    networkRef:
      name: demo-vpc

    sourceRanges:
      - 0.0.0.0/0

    targetTags:
      - demo-vm

    allow:
      - protocol: tcp
        ports:
          - "22"
      - protocol: tcp
        ports:
          - "80"
          - "443"
